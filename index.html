<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>HSC GPA Calculator Pro</title></head><body style='font-family:Segoe UI;background:#f4f6ff;padding:20px'><div style='max-width:900px;margin:auto;background:white;padding:20px;border-radius:20px'><h1>🎓 GPA Calculator</h1><div id='subs'></div><button onclick='addSubject()'>➕ নতুন Subject যোগ করুন</button><button onclick='calc()'>📊 Calculate GPA</button><div id='r'></div></div><script>let count=0;const grades=['A+','A','A-','B','C','D','F'];const gp={'A+':5,'A':4,'A-':3.5,'B':3,'C':2,'D':1,'F':0};function addSubject(name=''){subs.innerHTML+=`<div style="margin:10px 0;padding:10px;border:1px solid #ddd;border-radius:10px"><input id='n${count}' placeholder='Subject Name' value='${name}' style='width:60%;padding:8px'><select id='s${count}' style='width:35%;padding:8px'>${grades.map(g=>`<option>${g}</option>`).join('')}</select></div>`;count++;}['Bangla','English','ICT'].forEach(addSubject);function calc(){let total=0;for(let i=0;i<count;i++){let el=document.getElementById('s'+i);if(el) total+=gp[el.value];}document.getElementById('r').innerHTML='🏆 GPA: '+(total/count).toFixed(2);}</script></body></html>
