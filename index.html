<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>HSC GPA Calculator Pro</title><style>body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#667eea,#764ba2,#ff6b6b);min-height:100vh;padding:20px}.card{max-width:900px;margin:auto;background:#fff;border-radius:25px;padding:25px;box-shadow:0 15px 40px rgba(0,0,0,.2)}h1{text-align:center;color:#764ba2}select,button{width:100%;padding:12px;margin:8px 0;border-radius:12px;border:1px solid #ddd}button{background:linear-gradient(90deg,#667eea,#ff6b6b);color:#fff;font-weight:bold}.subject{background:#f8f9ff;padding:10px;border-radius:10px;margin:8px 0}#r{margin-top:20px;text-align:center;font-size:24px;font-weight:bold;color:#333}</style></head><body><div class='card'><h1>🎓 HSC GPA Calculator 2026</h1><select id='group' onchange='loadSubjects()'><option>🔬 Science</option><option>💼 Business Studies</option><option>📚 Humanities</option></select><div id='subs'></div><button onclick='calc()'>✨ Calculate GPA</button><div id='r'></div></div><script>const grades=['A+','A','A-','B','C','D','F'];const gp={'A+':5,'A':4,'A-':3.5,'B':3,'C':2,'D':1,'F':0};const groups={'🔬 Science':['Physics','Chemistry','Biology','Higher Math','ICT'],'💼 Business Studies':['Accounting','Finance','Marketing','Management','ICT'],'📚 Humanities':['History','Civics','Economics','Geography','ICT']};function loadSubjects(){subs.innerHTML='';groups[group.value].forEach((s,i)=>subs.innerHTML+=`<div class=subject><b>${s}</b><select id=s${i}>${grades.map(g=>`<option>${g}</option>`).join('')}</select></div>`)}loadSubjects();function calc(){let n=groups[group.value].length,t=0;for(let i=0;i<n;i++)t+=gp[document.getElementById('s'+i).value];let g=(t/n).toFixed(2);r.innerHTML='🏆 GPA: '+g+'<br>🎯 Group: '+group.value;}</script></body></html>
