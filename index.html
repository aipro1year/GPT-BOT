<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>HSC GPA Calculator Pro</title><style>body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#667eea,#764ba2,#ff6b6b);padding:20px}.card{max-width:900px;margin:auto;background:white;border-radius:25px;padding:25px}.subject{background:#f5f7ff;padding:10px;margin:8px 0;border-radius:10px}select,button{width:100%;padding:12px;margin:5px 0;border-radius:10px}button{background:#764ba2;color:white;border:none}#r{text-align:center;font-size:24px}</style></head><body><div class='card'><h1>🎓 HSC GPA Calculator 2026</h1><select id='group' onchange='loadSubjects()'><option>Science</option><option>Business Studies</option><option>Humanities</option></select><div id='subs'></div><button onclick='calc()'>Calculate GPA</button><div id='r'></div></div><script>const grades=['A+','A','A-','B','C','D','F'];const gp={'A+':5,'A':4,'A-':3.5,'B':3,'C':2,'D':1,'F':0};const groups={Science:['বাংলা ১ম','বাংলা ২য়','English 1st','English 2nd','ICT','পদার্থবিজ্ঞান','রসায়ন','জীববিজ্ঞান','উচ্চতর গণিত','ধর্ম','বাংলাদেশ ও বিশ্বপরিচয়'],Business:['বাংলা ১ম','বাংলা ২য়','English 1st','English 2nd','ICT','হিসাববিজ্ঞান','ফিন্যান্স','ব্যবসায় সংগঠন','পরিসংখ্যান','ধর্ম','বাংলাদেশ ও বিশ্বপরিচয়'],Humanities:['বাংলা ১ম','বাংলা ২য়','English 1st','English 2nd','ICT','ইতিহাস','পৌরনীতি','অর্থনীতি','ভূগোল','ধর্ম','বাংলাদেশ ও বিশ্বপরিচয়']};function loadSubjects(){subs.innerHTML='';groups[group.value].forEach((s,i)=>subs.innerHTML+=`<div class='subject'><b>${s}</b><select id='s${i}'>${grades.map(g=>`<option>${g}</option>`).join('')}</select></div>`)}loadSubjects();function calc(){let t=0,n=groups[group.value].length;for(let i=0;i<n;i++)t+=gp[document.getElementById('s'+i).value];r.innerHTML='🏆 GPA: '+(t/n).toFixed(2);}</script></body></html>
