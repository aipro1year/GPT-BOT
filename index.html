<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>HSC GPA Calculator Pro</title></head><body style='font-family:Arial;padding:15px'><h2>🇧🇩 HSC GPA Calculator 2026</h2><input id='name' placeholder='নাম'><input id='roll' placeholder='রোল'><div id='subs'></div><button onclick='calc()'>Calculate GPA</button><div id='r'></div><script>const subjects=['বাংলা ১ম','বাংলা ২য়','English 1st','English 2nd','ICT','Physics','Chemistry','Biology','Higher Math','Religion','Bangladesh Studies'];const grades=['A+','A','A-','B','C','D','F'];const gp={'A+':5,'A':4,'A-':3.5,'B':3,'C':2,'D':1,'F':0};subjects.forEach((s,i)=>{subs.innerHTML+=`<label>${s}</label><select id=s${i}>${grades.map(g=>`<option>${g}</option>`).join('')}</select>`});function calc(){let t=0;subjects.forEach((_,i)=>t+=gp[document.getElementById('s'+i).value]);document.getElementById('r').innerHTML='🎓 GPA: '+(t/subjects.length).toFixed(2);}</script></body></html>
