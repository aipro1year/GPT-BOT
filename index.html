<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Bangladesh GPA Calculator</title><style>body{font-family:system-ui;background:#f4f6f9;padding:20px} .box{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.1)} h1{text-align:center} input{width:100%;padding:12px;margin:6px 0;border:1px solid #ddd;border-radius:8px} button{width:100%;padding:12px;border:none;border-radius:8px;font-size:18px} #r{margin-top:20px;font-size:22px;font-weight:bold;text-align:center}</style></head><body><div class='box'><h1>🎓 HSC GPA Calculator</h1><p>Enter GPA for 6 subjects:</p><input id='a' placeholder='Bangla'><input id='b' placeholder='English'><input id='c' placeholder='ICT'><input id='d' placeholder='Subject 4'><input id='e' placeholder='Subject 5'><input id='f' placeholder='Subject 6'><button onclick='calc()'>Calculate Result</button><div id='r'></div></div><script>function grade(g){if(g==5)return 'A+';if(g>=4)return 'A';if(g>=3.5)return 'A-';if(g>=3)return 'B';if(g>=2)return 'C';if(g>=1)return 'D';return 'F';}function calc(){let ar=[a,b,c,d,e,f].map(x=>parseFloat(x.value)||0);let g=(ar.reduce((m,n)=>m+n,0)/ar.length).toFixed(2);document.getElementById('r').innerHTML='GPA: '+g+'<br>Grade: '+grade(parseFloat(g));}</script></body></html>
