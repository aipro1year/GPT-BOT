<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>HSC GPA Calculator 2026</title><style>body{font-family:Arial;padding:15px;background:#f4f4f4}.box{max-width:850px;margin:auto;background:#fff;padding:20px;border-radius:15px}input,select,button{width:100%;padding:10px;margin:5px 0}#r{text-align:center;font-size:22px;margin-top:10px}</style></head><body><div class='box'><h2>🇧🇩 HSC GPA Calculator 2026</h2><input id='name' placeholder='Student Name'><input id='roll' placeholder='Roll Number'><div id='subs'></div><button onclick='calc()'>Calculate GPA</button><button onclick='window.print()'>📄 Download / Save PDF</button><div id='r'></div></div><script>const grades=['A+','A','A-','B','C','D','F'];const gp={'A+':5,'A':4,'A-':3.5,'B':3,'C':2,'D':1,'F':0};for(let i=1;i<=11;i++){subs.innerHTML+=`<select id=s${i}>${grades.map(x=>`<option>${x}</option>`).join('')}</select>`}function calc(){let t=0;for(let i=1;i<=11;i++)t+=gp[document.getElementById('s'+i).value];let g=(t/11).toFixed(2);r.innerHTML='👨‍🎓 '+name.value+'<br>🆔 Roll: '+roll.value+'<br>🎓 GPA: '+g;}</script></body></html>
