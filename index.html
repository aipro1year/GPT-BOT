<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>HSC GPA Dashboard</title><style>body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#4f46e5,#7c3aed,#ec4899);min-height:100vh}.wrap{max-width:1100px;margin:auto;padding:20px}.top{background:white;border-radius:25px;padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.15)}.stats{display:flex;gap:10px;margin:15px 0}.box{flex:1;background:#eef2ff;padding:15px;border-radius:15px;text-align:center}.subject{background:#fff;padding:12px;border-radius:12px;margin:10px 0}.btn{padding:12px;border:none;border-radius:12px;color:white;cursor:pointer}.add{background:#10b981}.calc{background:#4f46e5}input,select{padding:10px;border-radius:10px;border:1px solid #ddd;width:100%}</style></head><body><div class='wrap'><div class='top'><h1>🎓 GPA Dashboard</h1><label>⭐ 4th Subject</label><input id='fourthSubject' placeholder='যেমন: Higher Math / Biology'><div class='stats'><div class='box'>📚 Subjects<br><span id='subCount'>3</span></div><div class='box'>🏆 GPA<br><span id='gpa'>0.00</span></div></div><div id='subs'></div><button class='btn add' onclick='addSubject()'>➕ Add Subject</button> <button class='btn calc' onclick='calc()'>📊 Calculate</button><div id='result'></div></div></div><script>let count=0;const grades=['A+','A','A-','B','C','D','F'];const gp={'A+':5,'A':4,'A-':3.5,'B':3,'C':2,'D':1,'F':0};function addSubject(n=''){subs.innerHTML+=`<div class=subject><input placeholder='Subject Name' value='${n}'><select id=s${count}>${grades.map(g=>`<option>${g}</option>`).join('')}</select></div>`;count++;subCount.innerText=count;}['Bangla 1st','English 1st','ICT'].forEach(addSubject);function calc(){let t=0;for(let i=0;i<count;i++){let e=document.getElementById('s'+i);if(e)t+=gp[e.value];}let res=(t/count).toFixed(2);gpa.innerText=res;result.innerHTML='✅ Final GPA: '+res+(fourthSubject.value?'<br>⭐ 4th Subject: '+fourthSubject.value:'');}</script></body></html>
