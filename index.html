<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>GPA Calculator</title><style>body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;padding:20px}input{width:100%;padding:10px;margin:8px 0}button{padding:10px 20px}#result{font-size:24px;font-weight:bold;margin-top:20px}</style></head><body><h1>🎓 GPA Calculator</h1><p>Enter your subject GPAs:</p><input id='g1' type='number' min='0' max='5' step='0.01' placeholder='Subject 1 GPA'><input id='g2' type='number' min='0' max='5' step='0.01' placeholder='Subject 2 GPA'><input id='g3' type='number' min='0' max='5' step='0.01' placeholder='Subject 3 GPA'><input id='g4' type='number' min='0' max='5' step='0.01' placeholder='Subject 4 GPA'><input id='g5' type='number' min='0' max='5' step='0.01' placeholder='Subject 5 GPA'><button onclick='calc()'>Calculate GPA</button><div id='result'></div><script>function calc(){let arr=[g1,g2,g3,g4,g5].map(x=>parseFloat(x.value)||0);let avg=arr.reduce((a,b)=>a+b,0)/arr.length;document.getElementById('result').innerText='GPA: '+avg.toFixed(2);}</script></body></html>
