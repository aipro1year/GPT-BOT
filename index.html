<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>HSC GPA Calculator BD</title><style>body{font-family:Arial;background:#eef2f7;padding:15px}.box{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:15px}select,button{width:100%;padding:10px;margin:5px 0}#r{text-align:center;font-size:22px;margin-top:15px}</style></head><body><div class='box'><h2>🇧🇩 HSC GPA Calculator 2026</h2><p>11 Subjects + 4th Subject Support</p><div id='f'></div><button onclick='calc()'>Calculate GPA</button><button onclick='document.body.classList.toggle("dark")'>🌙 Dark Mode</button><div id='r'></div></div><script>let grades=['A+','A','A-','B','C','D','F'],gp={'A+':5,'A':4,'A-':3.5,'B':3,'C':2,'D':1,'F':0};for(let i=1;i<=11;i++){f.innerHTML+=`<select id=s${i}>${grades.map(g=>`<option>${g}</option>`).join('')}</select>`;}function calc(){let t=0;for(let i=1;i<=11;i++)t+=gp[document.getElementById('s'+i).value];let g=(t/11).toFixed(2);r.innerHTML='🎓 GPA: '+g+'<br>🏆 Grade: '+(g>=5?'A+':'Calculated');} </script></body></html>
