<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Smart GPA Calculator</title><style>body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);padding:20px}.container{max-width:1100px;margin:auto}.card,.semester{background:#fff;border-radius:16px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,.15);margin-bottom:20px}.dashboard{position:sticky;top:10px;font-weight:bold}.row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;margin:10px 0}input,select,button{padding:10px;border-radius:10px;border:1px solid #ddd}button{cursor:pointer}.add{background:#10b981;color:#fff}.reset{background:#ef4444;color:#fff}.remove{background:#f97316;color:#fff}@media(max-width:768px){.row{grid-template-columns:1fr}}</style></head><body><div class='container'><div class='card dashboard'><h2>🎓 Smart GPA Calculator</h2><div>Total Credits: <span id='credits'>0.00</span> | CGPA: <span id='cgpa'>0.00</span></div></div><div id='semesters'></div><button class='add' onclick='addSemester()'>Add Semester</button> <button class='reset' onclick='location.reload()'>Reset All</button></div><script>const grades={"A+":5,"A":4,"A-":3.5,"B+":3,"B":2.75,"B-":2.5,"C+":2.25,"C":2,"D":1,"F":0};let sem=0;function addSemester(){const id=sem++;const d=document.createElement('div');d.className='semester';d.innerHTML=`<h3>Semester ${id+1}</h3><div id='s${id}'></div><button class='add' onclick='addSubject(${id})'>Add Subject</button><p>GPA: <span id='g${id}'>0.00</span></p>`;semesters.appendChild(d);addSubject(id);}function addSubject(id){const r=document.createElement('div');r.className='row';r.innerHTML=`<input placeholder='Subject'><input type='number' min='0' step='0.5' value='3' oninput='calc()'><select onchange='calc()'>${Object.keys(grades).map(g=>`<option>${g}</option>`).join('')}</select><button class='remove' onclick='this.parentElement.remove();calc()'>Remove</button>`;document.getElementById('s'+id).appendChild(r);calc();}function calc(){let totalP=0,totalC=0;document.querySelectorAll('.semester').forEach((s,i)=>{let p=0,c=0;s.querySelectorAll('.row').forEach(r=>{let cr=parseFloat(r.children[1].value)||0;let gr=grades[r.children[2].value]||0;c+=cr;p+=cr*gr;});document.getElementById('g'+i).innerText=(c?p/c:0).toFixed(2);totalC+=c;totalP+=p;});credits.innerText=totalC.toFixed(2);cgpa.innerText=(totalC?totalP/totalC:0).toFixed(2);}addSemester();</script></body></html>
