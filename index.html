<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>🇧🇩 HSC GPA Calculator Pro</title><style>body{font-family:Arial;background:linear-gradient(135deg,#e8f0ff,#f7f7f7);padding:15px}.box{max-width:900px;margin:auto;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);padding:20px;border-radius:20px}input,select,button{width:100%;padding:12px;margin:5px 0;border-radius:10px;border:1px solid #ccc}h2{text-align:center}#r{text-align:center;font-size:22px;font-weight:bold}</style></head><body><div class='box'><h2>🎓 HSC GPA Calculator 2026</h2><input id='name' placeholder='নাম / Name'><input id='roll' placeholder='রোল / Roll'><div id='subs'></div><button onclick='calc()'>Calculate Result</button><button onclick='window.print()'>📄 Save PDF</button><div id='r'></div></div><script>const g=['A+','A','A-','B','C','D','F'],p={'A+':5,'A':4,'A-':3.5,'B':3,'C':2,'D':1,'F':0};for(let i=1;i<=11;i++){subs.innerHTML+=`<select id=s${i}>${g.map(x=>`<option>${x}</option>`).join('')}</select>`}function calc(){let t=0;for(let i=1;i<=11;i++)t+=p[document.getElementById('s'+i).value];let gp=(t/11).toFixed(2);r.innerHTML='👨‍🎓 '+name.value+'<br>🆔 '+roll.value+'<br>🏆 GPA: '+gp+'<br>✅ HSC 2026 Result';localStorage.setItem('lastResult',r.innerHTML);}</script></body></html>
