<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>HSC GPA Calculator Pro</title></head><body style='font-family:Arial;padding:15px'><h2>🇧🇩 HSC GPA Calculator 2026</h2><select id='group' onchange='loadSubjects()'><option>Science</option><option>Business Studies</option><option>Humanities</option></select><div id='subs'></div><button onclick='calc()'>Calculate GPA</button><div id='r'></div><script>const grades=['A+','A','A-','B','C','D','F'];const gp={'A+':5,'A':4,'A-':3.5,'B':3,'C':2,'D':1,'F':0};const groups={Science:['Bangla 1st','Bangla 2nd','English 1st','English 2nd','ICT','Physics','Chemistry','Biology','Higher Math'], 'Business Studies':['Bangla 1st','Bangla 2nd','English 1st','English 2nd','ICT','Accounting','Finance','Business Organization','Statistics'], 'Humanities':['Bangla 1st','Bangla 2nd','English 1st','English 2nd','ICT','History','Civics','Economics','Geography']};function loadSubjects(){subs.innerHTML='';groups[group.value].forEach((s,i)=>subs.innerHTML+=`<label>${s}</label><select id=s${i}>${grades.map(g=>`<option>${g}</option>`).join('')}</select>`);}loadSubjects();function calc(){let t=0,n=groups[group.value].length;for(let i=0;i<n;i++)t+=gp[document.getElementById('s'+i).value];r.innerHTML='🎓 Group: '+group.value+'<br>🏆 GPA: '+(t/n).toFixed(2);}</script></body></html>
